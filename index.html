<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Martinews — Rétro 25-26</title>
<link rel="icon" href="logo.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:#0d0d0d; --cream:#f5f0e8; --gold:#c8a84b; --muted:#7a7268;
    --border:rgba(200,168,75,0.3);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{background:var(--cream);color:var(--ink);font-family:'Instrument Sans',sans-serif;overflow-x:hidden}

  /* LOADER */
  #page-loader{
    position:fixed;inset:0;z-index:9999;background:var(--ink);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
    transition:opacity 0.6s ease,visibility 0.6s ease;
  }
  #page-loader.hidden{opacity:0;visibility:hidden;pointer-events:none}
  .pl-brand{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--gold)}
  .pl-ring{width:48px;height:48px;border:2px solid rgba(200,168,75,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.9s linear infinite}
  .pl-ring.error{border-color:rgba(224,82,82,0.3);border-top-color:#e05252;animation:none}
  .pl-bar-wrap{width:180px;height:2px;background:rgba(200,168,75,0.15);border-radius:2px;overflow:hidden}
  .pl-bar{height:100%;width:0%;background:var(--gold);border-radius:2px;transition:width 0.4s ease}
  .pl-bar.error{background:#e05252}
  .pl-status{font-size:11px;font-weight:500;letter-spacing:0.35em;text-transform:uppercase;color:rgba(245,240,232,0.45);text-align:center}
  .pl-status.error{color:rgba(224,82,82,0.7)}
  .pl-retry{display:none;align-items:center;gap:8px;margin-top:8px;background:none;border:1px solid rgba(200,168,75,0.4);border-radius:4px;padding:10px 22px;color:var(--gold);font-family:'Instrument Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;transition:background 0.2s}
  .pl-retry:hover{background:rgba(200,168,75,0.1)}

  /* HERO */
  .hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;text-align:center;padding:40px 24px;background:var(--ink);overflow:hidden}
  .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(200,168,75,0.08) 0%,transparent 70%),repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(200,168,75,0.04) 39px,rgba(200,168,75,0.04) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(200,168,75,0.04) 39px,rgba(200,168,75,0.04) 40px)}
  .hero-eyebrow{font-size:11px;font-weight:600;letter-spacing:0.4em;text-transform:uppercase;color:var(--gold);margin-bottom:28px;position:relative;display:flex;align-items:center;gap:16px}
  .hero-eyebrow::before,.hero-eyebrow::after{content:'';display:inline-block;width:40px;height:1px;background:var(--gold);opacity:0.6}
  .hero-title{font-family:'Playfair Display',serif;font-size:clamp(52px,10vw,120px);font-weight:900;line-height:0.9;color:#fff;position:relative;letter-spacing:-2px}
  .hero-title span{color:var(--gold);font-style:italic}
  .hero-year{display:block;font-family:'Playfair Display',serif;font-size:clamp(80px,18vw,220px);font-weight:900;line-height:0.85;color:transparent;-webkit-text-stroke:1px rgba(200,168,75,0.25);letter-spacing:-8px;position:relative}
  .hero-desc{max-width:580px;margin:32px auto 0;font-size:16px;font-weight:300;line-height:1.75;color:rgba(245,240,232,0.65);position:relative}
  .hero-brand{margin-top:40px;font-size:13px;font-weight:600;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);opacity:0.7;position:relative}
  .hero-scroll{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;color:rgba(245,240,232,0.4);font-size:10px;letter-spacing:0.3em;text-transform:uppercase}
  .hero-scroll-line{width:1px;height:40px;background:linear-gradient(to bottom,rgba(200,168,75,0.6),transparent);animation:scrollPulse 2s ease-in-out infinite}
  @keyframes scrollPulse{0%,100%{opacity:0.4;transform:scaleY(1)}50%{opacity:1;transform:scaleY(1.2)}}

  /* VIDEO */
  .video-section{background:var(--ink);padding:80px 24px;text-align:center}
  .video-label{font-size:10px;font-weight:600;letter-spacing:0.4em;text-transform:uppercase;color:var(--gold);margin-bottom:24px}
  .video-wrapper{max-width:860px;margin:0 auto;border-radius:4px;overflow:hidden;border:1px solid var(--border);box-shadow:0 40px 100px rgba(0,0,0,0.6)}
  .video-wrapper iframe{display:block;width:100%;aspect-ratio:16/9;border:none}

  /* FRISE */
  .frise-section{padding:100px 0 120px;background:var(--cream)}
  .section-header{text-align:center;padding:0 24px;margin-bottom:80px}
  .section-tag{font-size:10px;font-weight:600;letter-spacing:0.4em;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
  .section-title{font-family:'Playfair Display',serif;font-size:clamp(32px,5vw,56px);font-weight:700;color:var(--ink);line-height:1.1}
  .section-title em{font-style:italic;color:var(--gold)}
  .timeline{max-width:960px;margin:0 auto;padding:0 24px;position:relative}
  .timeline-spine{position:absolute;left:50%;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,transparent,var(--gold) 3%,var(--gold) 97%,transparent);transform:translateX(-50%)}
  .month-marker{position:relative;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none}
  .month-marker-label{background:var(--cream);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-size:10px;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);position:relative;z-index:2;box-shadow:0 2px 12px rgba(200,168,75,0.12)}
  .month-marker-spacer{height:32px}
  .timeline-item{display:grid;grid-template-columns:1fr 60px 1fr;margin-bottom:0;position:relative;opacity:0;transform:translateY(20px);transition:opacity 0.55s ease,transform 0.55s ease}
  .timeline-item.visible{opacity:1;transform:translateY(0)}
  .timeline-item.left .event-card{grid-column:1;text-align:right;padding-right:28px;padding-left:0}
  .timeline-item.left .event-center{grid-column:2}
  .timeline-item.left .event-empty{grid-column:3}
  .timeline-item.right .event-empty{grid-column:1}
  .timeline-item.right .event-center{grid-column:2}
  .timeline-item.right .event-card{grid-column:3;text-align:left;padding-left:28px;padding-right:0}
  .event-center{display:flex;flex-direction:column;align-items:center;position:relative}
  .event-dot-wrap{position:relative;z-index:3;display:flex;align-items:center;justify-content:center;width:60px;flex-shrink:0;padding-top:18px}
  .event-dot{width:14px;height:14px;border-radius:50%;background:var(--cream);border:2px solid var(--gold);transition:transform 0.25s,background 0.25s;cursor:pointer;flex-shrink:0}
  .timeline-item:hover .event-dot{background:var(--gold);transform:scale(1.4)}
  .event-date-badge{position:absolute;top:14px;white-space:nowrap;font-size:10px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink);background:var(--cream);border:1px solid var(--border);padding:3px 10px;border-radius:12px;z-index:4;pointer-events:none;box-shadow:0 1px 6px rgba(0,0,0,0.06)}
  .timeline-item.right .event-date-badge{right:calc(100% + 6px)}
  .timeline-item.left .event-date-badge{left:calc(100% + 6px)}
  .event-card{padding-top:8px;padding-bottom:32px}
  .event-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--ink);margin-bottom:8px;line-height:1.25}
  .event-preview{font-size:13px;color:var(--muted);line-height:1.65;font-weight:300}
  .event-toggle{display:inline-flex;align-items:center;gap:6px;margin-top:10px;font-size:10px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);cursor:pointer;background:none;border:none;font-family:'Instrument Sans',sans-serif;padding:0;transition:gap 0.2s}
  .event-toggle:hover{gap:10px}
  .event-toggle svg{width:13px;height:13px;transition:transform 0.3s}
  .event-toggle.open svg{transform:rotate(180deg)}
  .timeline-item.left .event-toggle{margin-left:auto}
  .event-expanded{overflow:hidden;max-height:0;transition:max-height 0.5s cubic-bezier(0.4,0,0.2,1)}
  .event-expanded.open{max-height:800px}
  .event-expanded-inner{padding-top:14px;border-top:1px solid var(--border);margin-top:12px}
  .event-full-desc{font-size:14px;line-height:1.8;color:var(--ink);margin-bottom:14px}
  .event-video-embed{border-radius:4px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.12)}
  .event-video-embed iframe{display:block;width:100%;aspect-ratio:16/9;border:none}
  .event-empty{}

  @media(max-width:640px){
    .timeline-spine{left:22px}
    .timeline-item{grid-template-columns:44px 1fr !important}
    .timeline-item.left .event-card,.timeline-item.right .event-card{grid-column:2;text-align:left;padding-left:20px;padding-right:0}
    .timeline-item.left .event-center,.timeline-item.right .event-center{grid-column:1}
    .timeline-item.left .event-empty,.timeline-item.right .event-empty{display:none}
    .timeline-item.left .event-toggle{margin-left:0}
    .event-date-badge{display:none}
    .event-card::before{content:attr(data-date);display:block;font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
  }

  .footer{background:var(--ink);padding:40px 24px;text-align:center;color:rgba(245,240,232,0.3);font-size:12px;letter-spacing:0.1em}
  .footer-brand{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--gold);margin-bottom:12px}
  .loading{text-align:center;padding:60px;color:var(--muted);font-size:13px;letter-spacing:0.2em;text-transform:uppercase}
  .loader{width:32px;height:32px;border:1px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="page-loader">
  <div class="pl-brand">La Martinews</div>
  <div class="pl-ring" id="pl-ring"></div>
  <div class="pl-bar-wrap"><div class="pl-bar" id="pl-bar"></div></div>
  <div class="pl-status" id="pl-status">Connexion au serveur…</div>
  <button class="pl-retry" id="pl-retry" onclick="loadData()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4"/></svg>
    Réessayer
  </button>
</div>

<section class="hero">
  <div class="hero-eyebrow">La Martinews</div>
  <h1 class="hero-title" id="hero-title">Rétrospective<br><span>de l'année</span></h1>
  <span class="hero-year">2025</span>
  <p class="hero-desc" id="hero-desc"></p>
  <div class="hero-brand" id="hero-brand">La Martinews</div>
  <div class="hero-scroll"><div class="hero-scroll-line"></div><span>Défiler</span></div>
</section>

<section class="video-section" id="video-section" style="display:none">
  <div class="video-label">Vidéo de l'année</div>
  <div class="video-wrapper" id="main-video-wrapper"></div>
</section>

<section class="frise-section">
  <div class="section-header">
    <div class="section-tag">Chronologie année scolaire</div>
    <h2 class="section-title">Les moments <em>marquants</em></h2>
  </div>
  <div class="timeline" id="timeline-container">
    <div class="timeline-spine"></div>
    <div class="loading"><div class="loader"></div>Chargement…</div>
  </div>
</section>

<footer class="footer">
  <div class="footer-brand">La Martinews</div>
  <p>Rétrospective • Tous droits réservés</p>
</footer>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxZuVTocQNBrtr4OruE7XCK-f1zVSwnygGkMtU21f-sFZ-O-IE3x9crRimb0ddplKQg/exec';
const MOIS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

// ── Loader ──
function setLoader(msg, pct, err) {
  const s=document.getElementById('pl-status'), b=document.getElementById('pl-bar'), r=document.getElementById('pl-ring');
  if(s){s.textContent=msg; s.className='pl-status'+(err?' error':'')}
  if(b){b.style.width=pct+'%'; err?b.classList.add('error'):b.classList.remove('error')}
  if(r){err?r.classList.add('error'):r.classList.remove('error')}
}
function hideLoader(){document.getElementById('page-loader').classList.add('hidden')}
function showRetry(){document.getElementById('pl-retry').style.display='inline-flex'}
function hideRetry(){document.getElementById('pl-retry').style.display='none'}

// ── Video ──
function toEmbed(input) {
  if(!input) return null;
  input=input.trim();
  const src=input.match(/src=["']([^"']+)["']/);
  if(src) return src[1];
  const yt=input.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|shorts\/|embed\/))([A-Za-z0-9_-]{11})/);
  if(yt) return 'https://www.youtube.com/embed/'+yt[1];
  return null;
}
function renderVideo(input) {
  const sec=document.getElementById('video-section'), w=document.getElementById('main-video-wrapper');
  const embed=toEmbed(input);
  if(embed){w.innerHTML='<iframe src="'+embed+'" allow="autoplay; encrypted-media" allowfullscreen></iframe>'; sec.style.display='';}
  else sec.style.display='none';
}

// ── Date parsing ──
function monthIdx(name) {
  const n=name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const map={janvier:0,janv:0,jan:0,fevrier:1,fev:1,mars:2,mar:2,avril:3,avr:3,mai:4,juin:5,juillet:6,juil:6,aout:7,septembre:8,sep:8,octobre:9,oct:9,novembre:10,nov:10,decembre:11,dec:11};
  for(const k of Object.keys(map)){if(n.startsWith(k))return map[k];}
  return -1;
}
function parseDate(str) {
  if(!str) return null; str=str.trim(); let m;
  m=str.match(/^(\d{4})-(\d{2})-(\d{2})$/); if(m) return new Date(+m[1],+m[2]-1,+m[3]);
  m=str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/); if(m) return new Date(+m[3],+m[2]-1,+m[1]);
  m=str.match(/^(\d{1,2})\s+([a-zéèêëàâùûîïôœæçA-ZÉÈÀÂÙÛÎÏÔŒÆÇ]+)\s+(\d{4})$/i);
  if(m){const mo=monthIdx(m[2]); if(mo>=0) return new Date(+m[3],mo,+m[1]);}
  m=str.match(/^([a-zéèêëàâùûîïôœæçA-ZÉÈÀÂÙÛÎÏÔŒÆÇ]+)\s+(\d{4})$/i);
  if(m){const mo=monthIdx(m[1]); if(mo>=0) return new Date(+m[2],mo,15);}
  return null;
}
function parseDateFull(str) {
  if(!str) return {start:null,end:null,label:''};
  str=str.trim();
  // Plage : "du 16 au 20 février 2026"
  let m=str.match(/^(?:du\s+)?(\d{1,2})\s+au\s+(\d{1,2})\s+([a-zéàâùûîïôœæçA-ZÉÈÀÂÙÛÎÏÔŒÆÇ]+)(?:\s+(\d{4}))?$/i);
  if(m){
    const mo=monthIdx(m[3]), yr=m[4]?+m[4]:2025;
    if(mo>=0){
      return {start:new Date(yr,mo,+m[1]),end:new Date(yr,mo,+m[2]),label:m[1]+'–'+m[2]+' '+MOIS_FR[mo].substring(0,4)+'.'};
    }
  }
  const d=parseDate(str);
  if(d){
    const exact=str.match(/\d{1,2}[\s\/]/) || str.match(/^\d{4}-/);
    const label=(exact&&d.getDate()!==15)?(d.getDate()+' '+MOIS_FR[d.getMonth()].substring(0,4)+'.'):MOIS_FR[d.getMonth()];
    return {start:d,end:d,label};
  }
  return {start:null,end:null,label:str};
}
function schoolOrder(d) {
  if(!d) return 9999;
  const mo=d.getMonth();
  const order=[4,5,6,7,8,9,10,-1,-1,0,1,2,3];
  const o=order[mo]; if(o<0) return 9999;
  return o*10000+d.getFullYear()*100+d.getDate();
}

// ── Render Hero ──
function renderHero(data) {
  document.title=(data.titre||'Rétrospective')+' — La Martinews';
  document.getElementById('hero-title').innerHTML=data.titre||'Rétrospective<br><span>de l\'année</span>';
  document.getElementById('hero-desc').textContent=data.description||'';
  if(data.brand) document.getElementById('hero-brand').textContent=data.brand;
}

// ── Render Timeline ──
function renderTimeline(events) {
  const container=document.getElementById('timeline-container');
  if(!events||events.length===0){
    container.innerHTML='<div class="timeline-spine"></div><div class="loading" style="opacity:0.5">Aucun événement.</div>';
    return;
  }
  const sorted=[...events].map((ev,i)=>({ev,i,d:parseDateFull(ev.date).start})).sort((a,b)=>schoolOrder(a.d)-schoolOrder(b.d));
  let html='<div class="timeline-spine"></div>';
  let curMonth=-1, sideIdx=0;
  sorted.forEach(({ev,i})=>{
    const mo=parseDateFull(ev.date).start?.getMonth()??-1;
    if(mo>=0&&mo!==curMonth){
      curMonth=mo;
      html+=`<div class="month-marker"><span class="month-marker-label">${MOIS_FR[mo]}</span></div><div class="month-marker-spacer"></div>`;
    }
    const side=sideIdx%2===0?'left':'right'; sideIdx++;
    const {label}=parseDateFull(ev.date);
    const embed=toEmbed(ev.video);
    const preview=(ev.description||'').substring(0,110)+((ev.description||'').length>110?'…':'');
    const hasMore=(ev.description&&ev.description.length>0)||embed;
    const cardContent=`
      <div class="event-title">${ev.titre||''}</div>
      <p class="event-preview">${preview}</p>
      ${hasMore?`
      <button class="event-toggle" onclick="toggleEvent(this,'exp-${i}')">
        Afficher plus <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="event-expanded" id="exp-${i}">
        <div class="event-expanded-inner">
          <p class="event-full-desc">${ev.description||''}</p>
          ${embed?`<div class="event-video-embed"><iframe src="${embed}" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>`:''}
        </div>
      </div>`:''}`;
    if(side==='left'){
      html+=`<div class="timeline-item left">
        <div class="event-card" data-date="${ev.date||''}">${cardContent}</div>
        <div class="event-center"><div class="event-dot-wrap"><div class="event-dot"></div><span class="event-date-badge">${label}</span></div></div>
        <div class="event-empty"></div>
      </div>`;
    } else {
      html+=`<div class="timeline-item right">
        <div class="event-empty"></div>
        <div class="event-center"><div class="event-dot-wrap"><div class="event-dot"></div><span class="event-date-badge">${label}</span></div></div>
        <div class="event-card" data-date="${ev.date||''}">${cardContent}</div>
      </div>`;
    }
  });
  container.innerHTML=html;
  const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});},{threshold:0.12});
  document.querySelectorAll('.timeline-item').forEach(el=>obs.observe(el));
}

function toggleEvent(btn,id){
  const el=document.getElementById(id);
  const open=el.classList.toggle('open');
  btn.classList.toggle('open',open);
  btn.childNodes[0].textContent=open?'Réduire ':'Afficher plus ';
}

// ── Load data ──
async function loadData() {
  hideRetry();
  setLoader('Connexion au serveur…',10,false);
  try {
    setLoader('Chargement des contenus…',35);
    const res=await fetch(API_URL+'?action=getPublic');
    setLoader('Récupération des données…',65);
    const data=await res.json();
    setLoader('Mise en page…',85);
    renderHero(data.hero||{});
    renderVideo((data.hero||{}).video_url);
    renderTimeline(data.events||[]);
    setLoader('Prêt !',100);
    setTimeout(hideLoader,350);
  } catch(e) {
    console.error(e);
    setLoader('Serveur inaccessible',100,true);
    showRetry();
  }
}

loadData();
</script>
</body>
</html>
